name: API Tests

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 9 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Newman
        run: npm install -g newman

      - name: Run API Tests
        run: newman run aster_tests.json --global-var "base_url=https://aster.kz"
